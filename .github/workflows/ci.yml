name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate skill frontmatter and manifest versions
        run: npm run validate

      - name: Check generated artifacts are in sync
        run: |
          npm run generate
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated artifacts are stale. Run 'npm run generate' and commit the result."
            git status --porcelain
            git diff
            exit 1
          fi
